name: 🇳🇴 Daily SSB Post + Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate today post even if it exists'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: 📦 Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.4-${{ hashFiles('ssb-daily/r-packages.txt') }}
          restore-keys: ${{ runner.os }}-r-4.4-

      - name: 📚 Install R packages
        run: |
          Rscript -e "
            pkgs <- c(
              'httr2', 'jsonlite', 'glue', 'lubridate',
              'here', 'PxWebApiData', 'tidyverse',
              'ggplot2', 'scales', 'ggtext', 'ggrepel',
              'patchwork', 'cowplot',
              'ggridges', 'ggbeeswarm', 'ggalluvial', 'waffle',
              'gganimate', 'gifski',
              'MetBrewer', 'nord', 'wesanderson', 'viridis',
              'sf', 'rnaturalearth', 'rnaturalearthdata',
              'gt', 'gtExtras', 'knitr', 'rmarkdown',
              'leaflet'
            )
            missing <- pkgs[!pkgs %in% installed.packages()[,'Package']]
            if (length(missing) > 0) {
              message('Installing: ', paste(missing, collapse=', '))
              install.packages(missing,
                repos = 'https://packagemanager.posit.co/cran/__linux__/noble/latest',
                quiet = TRUE)
            } else {
              message('All packages already installed.')
            }
          "

      - name: 🤖 Generate daily SSB post via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force_regenerate }}" = "true" ]; then
            TODAY=$(date +%Y-%m-%d)
            rm -rf "ssb-daily/posts/$TODAY"
          fi
          Rscript ssb-daily/generate_post.R

      - name: 💾 Commit generated post
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ssb-daily/posts/
          if git diff --staged --quiet; then
            echo "No new post to commit"
          else
            git commit -m "🇳🇴 SSB post — $(date +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: 🔧 Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.5.0'

      - name: 🏗️ Render Quarto site
        run: quarto render

      - name: 💾 Commit _freeze cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _freeze/
          if git diff --staged --quiet; then
            echo "No freeze changes"
          else
            git commit -m "chore: update _freeze [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: 📄 Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
