name: 🇳🇴 Daily SSB Post + Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate today post even if it exists'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      R_LIBS_USER: ~/R/library

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. R setup ───────────────────────────────────────────────────────────
      - name: 🔧 Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      # ── 3. Cache R packages ───────────────────────────────────────────────────
      - name: 📦 Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/R/library
          key: ${{ runner.os }}-r-4.4-${{ hashFiles('ssb-daily/r-packages.txt') }}
          restore-keys: ${{ runner.os }}-r-4.4-

      # ── 4. Install R packages ─────────────────────────────────────────────────
      - name: 📚 Install R packages
        run: |
          mkdir -p ~/R/library
          Rscript -e "
            .libPaths('~/R/library')
            pkgs <- c(
              'httr2', 'jsonlite', 'glue', 'lubridate',
              'PxWebApiData', 'tidyverse',
              'ggplot2', 'scales', 'ggtext', 'ggrepel',
              'patchwork', 'cowplot',
              'ggridges', 'ggbeeswarm', 'ggalluvial', 'waffle',
              'gganimate', 'gifski',
              'MetBrewer', 'nord', 'wesanderson', 'viridis',
              'sf', 'rnaturalearth', 'rnaturalearthdata',
              'gt', 'gtExtras', 'knitr', 'rmarkdown'
            )
            installed <- installed.packages(.libPaths()[1])[,'Package']
            missing   <- pkgs[!pkgs %in% installed]
            if (length(missing) > 0) {
              message('Installing: ', paste(missing, collapse=', '))
              install.packages(missing, lib='~/R/library',
                repos='https://packagemanager.posit.co/cran/__linux__/noble/latest',
                quiet=TRUE)
            } else {
              message('All packages cached.')
            }
          "

      # ── 5. Generate today's post ─────────────────────────────────────────────
      - name: 🤖 Generate daily SSB post via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force_regenerate }}" = "true" ]; then
            TODAY=$(date +%Y-%m-%d)
            rm -rf "ssb-daily/posts/$TODAY"
            echo "Force regenerating post for $TODAY"
          fi
          Rscript ssb-daily/generate_post.R

      # ── 6. Commit new post ────────────────────────────────────────────────────
      - name: 💾 Commit generated post
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ssb-daily/posts/
          if git diff --staged --quiet; then
            echo "No new post to commit"
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "🇳🇴 SSB post — $TODAY [skip ci]"
            git push
          fi

      # ── 7. Quarto setup & render ─────────────────────────────────────────────
      - name: 🔧 Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.5.0'

      - name: 🏗️ Render Quarto site
        run: quarto render

      # ── 8. Commit _freeze folder (caches rendered outputs for next run) ───────
      - name: 💾 Commit _freeze cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _freeze/
          if git diff --staged --quiet; then
            echo "No freeze changes to commit"
          else
            git commit -m "chore: update _freeze cache [skip ci]"
            git push
          fi

      # ── 9. Deploy ─────────────────────────────────────────────────────────────
      - name: 📄 Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Done
        run: echo "Deployed → ${{ steps.deployment.outputs.page_url }}"
